name: 🛡️ PRECOP Sentinel Artifacts Forge

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  forge_artifacts:
    name: 🔨 Build Universal Bastion (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # 🛡️ NE PAS ANNULER LES AUTRES SI UN ÉCHOUE
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: precop-node-linux
            asset_name: precop-node-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: precop-node-macos
            asset_name: precop-node-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: precop-node-win.exe
            asset_name: precop-node-win.exe

    steps:
      - name: 🛰️ Clone Gateway
        uses: actions/checkout@v4

      - name: 🛠️ Install Toolchain (Rust)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 🛡️ Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang llvm libssl-dev musl-tools

      - name: 🛡️ Install Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install nasm cmake
          echo "C:\Program Files\NASM" >> $GITHUB_PATH

      - name: 🔨 Forge Sovereign Engine
        working-directory: ./engine
        run: |
          cargo build --release --target ${{ matrix.target }}
          
      - name: 📦 Prepare Binary (Linux/Mac)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p ../bin/
          cp engine/target/${{ matrix.target }}/release/florestad bin/${{ matrix.asset_name }}

      - name: 📦 Prepare Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p ../bin/
          copy engine\target\${{ matrix.target }}\release\florestad.exe bin\${{ matrix.asset_name }}
        shell: cmd

      - name: 📦 Seal Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: bin/${{ matrix.asset_name }}

  release:
    name: 👸 Final Scellement - Sovereign Release
    needs: forge_artifacts
    if: always() # 🛡️ TENTER DE RÉALISER LA RELEASE MÊME SI UN BINAIRE MANQUE
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Clone Gateway
        uses: actions/checkout@v4

      - name: 📥 Collect Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 🚀 Launch v1.0.0 Sentinel Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/precop-node-linux/precop-node-linux
            artifacts/precop-node-macos/precop-node-macos
            artifacts/precop-node-win.exe/precop-node-win.exe
          tag_name: ${{ github.ref_name }}
          name: 🛡️ PRECOP Sentinel v1.0.0 - Sovereign Release Candidate
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true # 🛡️ NE PAS BLOQUER SI UN FICHIER MANQUE
